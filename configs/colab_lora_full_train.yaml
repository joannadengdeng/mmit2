# Colab: full LoRA training on the complete train split.
#
# This is the "real" training config, not a smoke/debug config:
# - no max_samples cap
# - output goes to Drive/MyDrive/mmit2_output/...
#
# Usage:
#   python -m mmit2.trainrun --config configs/colab_lora_full_train.yaml

runtime:
  mode: colab
  colab:
    mount_drive: true
    drive_mount_point: "/content/drive"
    pip_install:
      - "mmit2[finetune]"
      - "bitsandbytes"
    output_to_drive: true

model:
  model_path: "Qwen/Qwen2.5-VL-3B-Instruct"

training:
  ft_method: lora
  num_epochs: 1
  per_device_batch_size: 1
  gradient_accumulation_steps: 8
  learning_rate: 2.0e-4
  warmup_ratio: 0.03
  weight_decay: 0.0
  max_grad_norm: 1.0
  save_steps: 1000
  output_dir: "lora_colab_full_train"
  params:
    lora_r: 8
    lora_alpha: 16
    lora_dropout: 0.05
    target_modules: ["q_proj", "v_proj"]

data:
  adapter: hf_datasets
  data_path: "lmms-lab/VQAv2"
  split: train
