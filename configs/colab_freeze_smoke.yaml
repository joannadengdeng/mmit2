# Tiny Colab smoke test for the Freeze Tuning path.
# Goal: exercise explicit module-unfreezing and custom checkpoint save/load.

runtime:
  mode: colab
  colab:
    mount_drive: true
    drive_mount_point: "/content/drive"
    pip_install:
      - "mmit2[finetune]"
      - "bitsandbytes"
    output_to_drive: true

model:
  model_path: "Qwen/Qwen2.5-VL-3B-Instruct"

training:
  ft_method: freeze
  num_epochs: 1
  per_device_batch_size: 1
  gradient_accumulation_steps: 4
  learning_rate: 1.0e-5
  warmup_ratio: 0.03
  weight_decay: 0.0
  max_grad_norm: 1.0
  save_steps: 50
  output_dir: "output/freeze_colab_smoke"
  params:
    unfreeze_modules:
      - "model.language_model.layers.0"

data:
  adapter: hf_datasets
  data_path: "lmms-lab/VQAv2"
  split: train
  max_samples: 12
