# SSH: freeze tuning on a remote server
#
# Usage:
#   python -m mmit2.training --config configs/ssh_freeze.yaml

runtime:
  mode: ssh
  ssh:
    host: "192.168.1.100"
    port: 22
    username: "root"
    key_path: "~/.ssh/id_rsa"
    # password: ""
    conda_env: "mmit"

model:
  model_path: "Qwen/Qwen2.5-VL-3B-Instruct"

training:
  ft_method: freeze
  num_epochs: 3
  per_device_batch_size: 1
  gradient_accumulation_steps: 4
  learning_rate: 1.0e-5
  warmup_ratio: 0.03
  weight_decay: 0.0
  max_grad_norm: 1.0
  save_steps: 200
  output_dir: "output/freeze_remote"
  params:
    model_layout: "qwen2_5_vl"
    unfreeze_modules:
      - "model.language_model.layers.0"
      - "model.language_model.layers.1"
      - "model.language_model.layers.2"
      - "model.language_model.layers.3"

data:
  adapter: hf_datasets
  data_path: "lmms-lab/textvqa"
  split: train
  max_samples: 100
