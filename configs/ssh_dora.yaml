# SSH: DoRA training on a remote server
#
# Usage:
#   python -m mmit2.training --config configs/ssh_dora.yaml

runtime:
  mode: ssh
  ssh:
    host: "192.168.1.100"
    port: 22
    username: "root"
    key_path: "~/.ssh/id_rsa"
    # password: ""
    conda_env: "mmit"

model:
  model_path: "Qwen/Qwen2.5-VL-3B-Instruct"

training:
  ft_method: dora
  num_epochs: 3
  per_device_batch_size: 1
  gradient_accumulation_steps: 4
  learning_rate: 2.0e-4
  warmup_ratio: 0.03
  weight_decay: 0.0
  max_grad_norm: 1.0
  save_steps: 200
  output_dir: "output/dora_remote"
  params:
    lora_r: 8
    lora_alpha: 16
    lora_dropout: 0.05
    target_modules: ["q_proj", "v_proj"]

data:
  adapter: hf_datasets
  data_path: "lmms-lab/textvqa"
  split: train
  max_samples: 100
