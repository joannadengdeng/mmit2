# SSH: evaluate an existing named experiment without retraining.
#
# Usage:
#   python -m mmit2.eval --config configs/ssh_experiment_eval.yaml

runtime:
  mode: ssh
  ssh:
    host: "192.168.1.100"
    port: 22
    username: "root"
    key_path: "~/.ssh/id_rsa"
    # password: ""
    conda_env: "mmit"

model:
  model_path: "Qwen/Qwen2.5-VL-3B-Instruct"

experiment:
  name: "replace_with_experiment_name"
  base_dir: "experiments"

eval:
  dataset_name: "lmms-lab/textvqa"
  split: validation
  max_samples: 100
  max_new_tokens: 16
  temperature: 0.0
