# SSH: LoRA training on the full TextVQA train split.
#
# Usage:
#   python -m mmit2.training --config configs/ssh_lora_textvqa.yaml

runtime:
  mode: ssh
  ssh:
    host: "192.168.1.100"
    port: 22
    username: "root"
    key_path: "~/.ssh/id_rsa"
    # password: ""
    conda_env: "mmit"

model:
  model_path: "Qwen/Qwen2.5-VL-3B-Instruct"

experiment:
  base_dir: "experiments"

training:
  ft_method: lora
  num_epochs: 1
  per_device_batch_size: 1
  gradient_accumulation_steps: 8
  learning_rate: 2.0e-4
  warmup_ratio: 0.03
  weight_decay: 0.0
  max_grad_norm: 1.0
  save_steps: 1000
  output_dir: "output/lora_textvqa_remote"
  params:
    lora_r: 8
    lora_alpha: 16
    lora_dropout: 0.05
    target_modules: ["q_proj", "v_proj"]

data:
  adapter: hf_datasets
  data_path: "lmms-lab/textvqa"
  split: train
