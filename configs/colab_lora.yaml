# Colab: LoRA training on Google Colab
# Automatically installs packages and saves output to Google Drive
#
# Usage in Colab terminal:
#   python -m mmit2.training --config configs/colab_lora.yaml

runtime:
  mode: colab
  colab:
    mount_drive: true
    drive_mount_point: "/content/drive"
    pip_install:
      - "mmit2[finetune]"
      - "bitsandbytes"
    output_to_drive: true       # saves to Drive/MyDrive/mmit2_output/...

model:
  model_path: "Qwen/Qwen2.5-VL-3B-Instruct"

training:
  ft_method: lora
  num_epochs: 1
  per_device_batch_size: 1
  gradient_accumulation_steps: 8
  learning_rate: 2.0e-4
  warmup_ratio: 0.03
  save_steps: 100
  output_dir: "lora_colab_run"
  params:
    lora_r: 8
    lora_alpha: 16
    lora_dropout: 0.05
    target_modules: ["q_proj", "v_proj"]

data:
  adapter: hf_datasets
  data_path: "lmms-lab/VQAv2"
  split: train
  max_samples: 50
