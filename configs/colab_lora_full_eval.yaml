# Colab: full LoRA training on the complete train split, followed by full eval.
#
# This is intentionally much heavier than the smoke/debug configs:
# - trains on the full training split (no max_samples cap)
# - evaluates entire eval splits / benchmark datasets
#
# Usage:
#   python -m mmit2.fullrun --config configs/colab_lora_full_eval.yaml

runtime:
  mode: colab
  colab:
    mount_drive: true
    drive_mount_point: "/content/drive"
    pip_install:
      - "mmit2[finetune]"
      - "bitsandbytes"
    output_to_drive: true

model:
  model_path: "Qwen/Qwen2.5-VL-3B-Instruct"

training:
  ft_method: lora
  num_epochs: 1
  per_device_batch_size: 1
  gradient_accumulation_steps: 8
  learning_rate: 2.0e-4
  warmup_ratio: 0.03
  weight_decay: 0.0
  max_grad_norm: 1.0
  save_steps: 1000
  output_dir: "lora_colab_full_eval"
  params:
    lora_r: 8
    lora_alpha: 16
    lora_dropout: 0.05
    target_modules: ["q_proj", "v_proj"]

data:
  adapter: hf_datasets
  data_path: "lmms-lab/VQAv2"
  split: train

eval:
  max_new_tokens: 16
  temperature: 0.0
  targets:
    - type: hf_vqa
      name: vqav2_validation
      dataset_name: "lmms-lab/VQAv2"
      split: validation
      task_type: open_vqa
      metrics: ["auto"]
      streaming: true
    - type: hf_vqa
      name: textvqa_validation
      dataset_name: "lmms-lab/textvqa"
      split: validation
      task_type: open_vqa
      metrics: ["auto"]
      streaming: true
    - type: hf_vqa
      name: vizwiz_validation
      dataset_name: "lmms-lab/VizWiz-VQA"
      split: validation
      task_type: open_vqa
      metrics: ["auto"]
      streaming: true
    - type: pope_hf
      name: pope_test
      dataset_name: "lmms-lab/POPE"
      split: test
      max_new_tokens: 8
      streaming: true
    - type: mme_hf
      name: mme_test
      dataset_name: "lmms-lab/MME"
      split: test
      max_new_tokens: 8
      streaming: true
