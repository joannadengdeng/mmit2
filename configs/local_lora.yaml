# LoRA: Low-Rank Adaptation (bf16 precision)
# Requires more VRAM than QLoRA but potentially better quality

runtime:
  mode: local

model:
  model_path: "Qwen/Qwen2.5-VL-3B-Instruct"

training:
  ft_method: lora
  num_epochs: 3
  per_device_batch_size: 1
  gradient_accumulation_steps: 4
  learning_rate: 2.0e-4
  warmup_ratio: 0.03
  weight_decay: 0.0
  max_grad_norm: 1.0
  save_steps: 200
  output_dir: "output/lora_qwen2vl_3b"
  params:
    lora_r: 8
    lora_alpha: 16
    lora_dropout: 0.05
    target_modules: ["q_proj", "v_proj"]

data:
  adapter: hf_datasets
  data_path: "lmms-lab/VQAv2"
  split: train
  max_samples: 100
